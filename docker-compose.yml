services:

  # ── Qdrant — vector database for semantic search ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.4
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  # ── RAG Backend — FastAPI with hybrid search + Claude AI ──────────────────────
  email-rag-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: email-rag-backend
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      # OpenArchiver internal services — container names as shown in Docker
      MEILISEARCH_URL:        http://OpenArchiver-MEILI:7700
      MEILISEARCH_MASTER_KEY: YOUR_MEILI_MASTER_KEY_HERE
      DATABASE_URL:           postgresql://YOUR_PG_USER:YOUR_PG_PASSWORD@OpenArchiver-DB:5432/YOUR_PG_DB
      # Qdrant
      QDRANT_URL:             http://qdrant:6333
      # Storage — path where OpenArchiver stores .eml files (mounted read-only)
      STORAGE_ROOT:           /var/data/open-archiver
      # AI keys
      ANTHROPIC_API_KEY:      YOUR_ANTHROPIC_API_KEY_HERE
      OPENAI_API_KEY:         YOUR_OPENAI_API_KEY_HERE
    volumes:
      # Mount OpenArchiver's email storage read-only so the backend can read .eml files
      - /path/to/openarchiver/data:/var/data/open-archiver:ro
    ports:
      - "8001:8001"

  # ── Web Frontend — Nginx serves the search UI ─────────────────────────────────
  email-rag-frontend:
    image: nginx:1.27-alpine
    container_name: email-rag-frontend
    restart: unless-stopped
    depends_on:
      - email-rag-backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8090:80"

volumes:
  qdrant_data:

# Join the existing OpenArchiver network so container hostnames resolve correctly.
# Change "openarchiver_default" to match your actual Docker network name.
# Find it with: docker network ls
networks:
  default:
    external: true
    name: openarchiver_default
